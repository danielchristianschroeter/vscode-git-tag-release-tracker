name: Create Release

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Release Versions
        id: version_step
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          PACKAGE_VERSION="${TAG_VERSION#v}"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Print Versions
        run: |
          echo "Tag version: ${{ steps.version_step.outputs.tag_version }}"
          echo "Package version: ${{ steps.version_step.outputs.package_version }}"

      - name: Validate Release Tag
        run: |
          TAG_VERSION='${{ steps.version_step.outputs.tag_version }}'
          if [[ ! "$TAG_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must be semantic versions like 3.0.1 or v3.0.1"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Changelog Entry
        run: |
          TAG_VERSION='${{ steps.version_step.outputs.tag_version }}'
          NORMALIZED_VERSION="${TAG_VERSION#v}"
          if ! grep -Eq "^## \[$NORMALIZED_VERSION\]$|^## \[$TAG_VERSION\]$" CHANGELOG.md; then
            echo "CHANGELOG.md does not contain an entry for $TAG_VERSION"
            exit 1
          fi

      - name: Validate Manifest Version
        run: |
          PACKAGE_VERSION='${{ steps.version_step.outputs.package_version }}'
          MANIFEST_VERSION=$(node -p "require('./package.json').version")
          if [[ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "package.json version ($MANIFEST_VERSION) does not match release version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update package.json version
        run: |
          npm version --no-git-tag-version ${{ steps.version_step.outputs.package_version }}

      - name: Package VSCode extension
        run: |
          npm run compile
          npm run package-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            ./*.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
